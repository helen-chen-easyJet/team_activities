<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workplace Wellbeing Check-in</title>
  <meta name="description" content="A 15-question mental health awareness quiz for workplace teams. Reflect, discuss, and take action together." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50: #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-400: #7F77DD;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --teal-50: #E1F5EE;
      --teal-400: #5DCAA5;
      --teal-600: #0F6E56;
      --amber-50: #FAEEDA;
      --amber-400: #FAC775;
      --amber-600: #BA7517;
      --coral-50: #FAECE7;
      --coral-400: #F0997B;
      --coral-600: #993C1D;
      --blue-50: #E6F1FB;
      --blue-400: #85B7EB;
      --blue-600: #185FA5;
      --gray-100: #D3D1C7;
      --gray-200: #B4B2A9;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --surface-2: #F4F3EF;
      --text-primary: #1A1A18;
      --text-secondary: #5F5E5A;
      --text-hint: #888780;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 14px;
      --radius-xl: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1E1E1B;
        --surface-2: #272723;
        --text-primary: #F0EFE8;
        --text-secondary: #A8A79F;
        --text-hint: #6B6A63;
        --border: rgba(255,255,255,0.09);
        --border-strong: rgba(255,255,255,0.16);
        --purple-50: #26215C;
        --purple-200: #3C3489;
        --purple-400: #7F77DD;
        --purple-600: #AFA9EC;
        --purple-800: #CECBF6;
        --teal-50: #04342C;
        --teal-400: #1D9E75;
        --teal-600: #9FE1CB;
        --amber-50: #412402;
        --amber-400: #BA7517;
        --amber-600: #FAC775;
        --coral-50: #4A1B0C;
        --coral-400: #D85A30;
        --coral-600: #F5C4B3;
        --blue-50: #042C53;
        --blue-400: #378ADD;
        --blue-600: #B5D4F4;
      }
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .page-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .header-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .header-logo span {
      color: var(--purple-400);
    }

    .header-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-hint);
    }

    main {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
    }

    .quiz-container {
      width: 100%;
      max-width: 560px;
    }

    footer {
      padding: 1.5rem 2rem;
      border-top: 0.5px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--text-hint);
      background: var(--surface);
    }

    /* ── Quiz header ── */
    .quiz-header { margin-bottom: 2.5rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 1.1rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--purple-400);
      border-radius: 50%;
    }

    .quiz-title {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.25;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .quiz-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 2rem; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-hint);
      margin-bottom: 9px;
    }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--purple-400);
      border-radius: 2px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-hint);
      margin-bottom: 0.9rem;
    }

    /* ── Question card ── */
    .question-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.6rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .question-num {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple-400);
      margin-bottom: 0.65rem;
    }

    .question-text {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.55;
      margin-bottom: 1.3rem;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      width: 100%;
      line-height: 1.4;
    }

    .option-btn:hover {
      border-color: var(--purple-200);
      background: var(--purple-50);
      color: var(--purple-800);
    }

    .option-btn.selected {
      border-color: var(--purple-400);
      background: var(--purple-50);
      color: var(--purple-800);
    }

    .option-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .option-btn.selected .option-dot {
      background: var(--purple-400);
      border-color: var(--purple-400);
    }

    .option-btn.selected .option-dot::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
    }

    /* ── Nav ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }

    .btn-back, .btn-next {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }

    .btn-back {
      background: transparent;
      border: 0.5px solid var(--border-strong);
      color: var(--text-secondary);
    }
    .btn-back:hover { background: var(--surface-2); }

    .btn-next {
      background: var(--purple-400);
      border: none;
      color: #fff;
    }
    .btn-next:hover { background: var(--purple-600); }
    .btn-next:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── Results ── */
    .results-wrap {
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-hero {
      text-align: center;
      padding: 2rem 1rem 2.5rem;
    }

    .score-ring {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.2rem;
    }

    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text-primary);
      margin-bottom: 0.6rem;
    }

    .results-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
      max-width: 400px;
      margin: 0 auto;
    }

    .domain-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 1.75rem 0;
    }

    @media (max-width: 400px) {
      .domain-grid { grid-template-columns: 1fr; }
    }

    .domain-card {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .domain-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-hint);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .domain-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 7px;
    }

    .domain-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1) 0.25s;
    }

    .domain-score {
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Tips ── */
    .tips-list { margin-top: 0.5rem; }

    .tip-item {
      display: flex;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .tip-item:last-child { border-bottom: none; }

    .tip-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .tip-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .tip-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .btn-restart {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      background: var(--purple-400);
      border: none;
      color: #fff;
      cursor: pointer;
      margin-top: 2rem;
      transition: background 0.15s;
      display: block;
      width: 100%;
    }
    .btn-restart:hover { background: var(--purple-600); }

    .disclaimer {
      font-size: 11px;
      color: var(--text-hint);
      text-align: center;
      margin-top: 1.25rem;
      line-height: 1.6;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <header>
    <div class="header-logo">wellbeing<span>.</span>quiz</div>
    <div class="header-tag">Team activity</div>
  </header>

  <main>
    <div class="quiz-container" id="quiz-root" role="main" aria-label="Workplace wellbeing quiz"></div>
  </main>

  <footer>
    Not a clinical tool &mdash; for awareness and team reflection only &nbsp;&middot;&nbsp;
    Mind helpline: 0300 123 3393 &nbsp;&middot;&nbsp;
    Samaritans: 116 123
  </footer>

</div>

<script>
const sections = [
  {
    name: "Stress & workload",
    color: "#7F77DD", fill: "var(--purple-50)",
    items: [
      { q: "How often do you feel overwhelmed by your workload?", opts: ["Rarely or never","Occasionally","Often","Almost every day"] },
      { q: "Are you able to fully disconnect from work during evenings or weekends?", opts: ["Almost always","Most of the time","Sometimes","Rarely or never"] },
      { q: "When you have a heavy week, do you have the flexibility to recover your energy at work?", opts: ["Yes, easily","Somewhat","Not really","No flexibility at all"] },
    ]
  },
  {
    name: "Connection & belonging",
    color: "#1D9E75", fill: "var(--teal-50)",
    items: [
      { q: "How supported do you feel by your team or colleagues?", opts: ["Very supported","Somewhat supported","Neutral","Unsupported"] },
      { q: "Do you feel comfortable talking about stress or struggles with your manager?", opts: ["Very comfortable","Somewhat comfortable","A little uncomfortable","Not at all comfortable"] },
      { q: "Do you feel like you genuinely belong in your team?", opts: ["Strongly yes","Mostly yes","Sometimes","Rarely or no"] },
    ]
  },
  {
    name: "Recognition & purpose",
    color: "#BA7517", fill: "var(--amber-50)",
    items: [
      { q: "How often do you feel your contributions are recognised at work?", opts: ["Frequently","Sometimes","Rarely","Never"] },
      { q: "Does your work feel meaningful or purposeful?", opts: ["Almost always","Often","Sometimes","Rarely"] },
      { q: "When you do good work, does your team or manager acknowledge it?", opts: ["Consistently","Often","Occasionally","Rarely or never"] },
    ]
  },
  {
    name: "Boundaries & recovery",
    color: "#D85A30", fill: "var(--coral-50)",
    items: [
      { q: "How would you describe your ability to set boundaries at work (e.g. saying no, protecting time)?", opts: ["Very good","Fairly good","Struggling a bit","Very difficult"] },
      { q: "How often do you take proper breaks during the working day?", opts: ["Regularly","Occasionally","Rarely","Almost never"] },
      { q: "Do you feel guilty taking time off or using your holiday allowance?", opts: ["Never","Sometimes","Often","Almost always"] },
    ]
  },
  {
    name: "Culture & resources",
    color: "#185FA5", fill: "var(--blue-50)",
    items: [
      { q: "How aware are you of the mental health resources your employer offers?", opts: ["Very aware","Somewhat aware","Vaguely aware","Unaware"] },
      { q: "Do you believe your workplace culture genuinely supports mental wellbeing?", opts: ["Strongly","Somewhat","Not really","Not at all"] },
      { q: "If a colleague was visibly struggling, would you feel confident knowing how to support them?", opts: ["Very confident","Fairly confident","Unsure","Not confident at all"] },
    ]
  }
];

const tips = [
  { label: "Try a weekly team check-in", desc: "Even 5 minutes to share how everyone's doing builds psychological safety over time.", icon: "◎", bg: "var(--purple-50)", col: "var(--purple-400)" },
  { label: "Encourage proper lunch breaks", desc: "Model healthy boundaries — step away from your desk and invite others to do the same.", icon: "◑", bg: "var(--teal-50)", col: "var(--teal-600)" },
  { label: "Recognise effort, not just results", desc: "A simple 'I noticed your work on X' goes further than formal awards programmes.", icon: "◈", bg: "var(--amber-50)", col: "var(--amber-600)" },
  { label: "Share your EAP and resources", desc: "Many employees don't use wellbeing resources because they don't know they exist. Pin them to your team channel.", icon: "◆", bg: "var(--blue-50)", col: "var(--blue-600)" },
  { label: "Normalise taking breaks and leave", desc: "Senior team members visibly taking holidays sends a stronger signal than any policy document.", icon: "◐", bg: "var(--coral-50)", col: "var(--coral-600)" },
];

const allQ = [];
sections.forEach(sec => sec.items.forEach(item => allQ.push({ section: sec.name, q: item.q, opts: item.opts })));

const domains = sections.map((sec, si) => ({
  name: sec.name, color: sec.color, fill: sec.fill,
  idxs: sec.items.map((_, ii) => si * 3 + ii)
}));

let answers = new Array(allQ.length).fill(null);
let current = 0;
let showResults = false;

function scoreAt(i) { const a = answers[i]; return a === null ? null : [3,2,1,0][a]; }
function domainScore(d) {
  const vals = d.idxs.map(scoreAt).filter(v => v !== null);
  return vals.length ? Math.round((vals.reduce((a,b)=>a+b,0) / (vals.length*3)) * 100) : 0;
}
function totalScore() {
  const all = allQ.map((_,i)=>scoreAt(i)).filter(v=>v!==null);
  return all.length ? Math.round((all.reduce((a,b)=>a+b,0) / (all.length*3)) * 100) : 0;
}
function getLabel(s) {
  if (s >= 75) return { label: "Thriving", summary: "Your team appears to be in a strong place. Keep up the conditions that make this possible — they're rarer than you think." };
  if (s >= 50) return { label: "Doing okay", summary: "There are real strengths here, alongside some areas worth paying attention to. Small, consistent changes go a long way." };
  if (s >= 25) return { label: "Some strain showing", summary: "Your responses suggest pressure points that deserve attention. Opening up conversations in your team can be a powerful first step." };
  return { label: "Needs attention", summary: "These results suggest significant strain. Consider reaching out to your HR team or manager to explore support options." };
}

function render() {
  const root = document.getElementById('quiz-root');
  if (showResults) {
    const ts = totalScore();
    const { label, summary } = getLabel(ts);
    const C = 2 * Math.PI * 36;
    const offset = +(C - (ts/100) * C).toFixed(2);
    root.innerHTML = `
      <div class="quiz-header">
        <div class="badge"><span class="badge-dot"></span>Results</div>
        <h1 class="quiz-title">Your results</h1>
        <p class="quiz-subtitle">A snapshot of how your workplace supports wellbeing. Not a clinical assessment — a conversation starter.</p>
      </div>
      <div class="results-wrap">
        <div class="results-hero">
          <svg class="score-ring" viewBox="0 0 80 80" aria-label="${ts}% overall wellbeing score">
            <circle cx="40" cy="40" r="36" fill="none" stroke="var(--border)" stroke-width="5"/>
            <circle cx="40" cy="40" r="36" fill="none" stroke="var(--purple-400)" stroke-width="5"
              stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset}"
              stroke-linecap="round" transform="rotate(-90 40 40)"/>
            <text x="40" y="38" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" font-weight="500" fill="var(--purple-400)">${ts}%</text>
            <text x="40" y="52" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="var(--text-hint)">overall</text>
          </svg>
          <p class="results-title">${label}</p>
          <p class="results-summary">${summary}</p>
        </div>
        <div class="section-label">Breakdown by area</div>
        <div class="domain-grid">
          ${domains.map(d => {
            const ds = domainScore(d);
            return `<div class="domain-card">
              <div class="domain-name">${d.name}</div>
              <div class="domain-bar-track"><div class="domain-bar-fill" style="width:${ds}%;background:${d.color};"></div></div>
              <div class="domain-score" style="color:${d.color};">${ds}%</div>
            </div>`;
          }).join('')}
        </div>
        <div class="section-label" style="margin-top:1.75rem;">Things to try with your team</div>
        <div class="tips-list">
          ${tips.map(t=>`
            <div class="tip-item">
              <div class="tip-icon" style="background:${t.bg};color:${t.col};">${t.icon}</div>
              <div>
                <div class="tip-label">${t.label}</div>
                <div class="tip-desc">${t.desc}</div>
              </div>
            </div>`).join('')}
        </div>
        <button class="btn-restart" onclick="restart()">Take the quiz again</button>
        <p class="disclaimer">If you or a colleague are struggling, please reach out to your GP, a trusted person, or a mental health helpline.</p>
      </div>`;
    return;
  }

  const q = allQ[current];
  const showSection = current === 0 || allQ[current-1].section !== q.section;
  const pct = Math.round((current / allQ.length) * 100);
  const answered = answers[current];

  root.innerHTML = `
    <div class="quiz-header">
      <div class="badge"><span class="badge-dot"></span>Mental health awareness</div>
      <h1 class="quiz-title">Workplace wellbeing check-in</h1>
      <p class="quiz-subtitle">15 questions &middot; Reflect on how your workplace supports mental health &middot; No right or wrong answers</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Question ${current+1} of ${allQ.length}</span>
        <span>${pct}% complete</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
    </div>
    ${showSection ? `<div class="section-label">${q.section}</div>` : ''}
    <div class="question-card">
      <div class="question-num">Q${current+1}</div>
      <p class="question-text">${q.q}</p>
      <div class="options-grid" role="group" aria-label="Answer options">
        ${q.opts.map((opt,i)=>`
          <button class="option-btn ${answered===i?'selected':''}" onclick="select(${i})" aria-pressed="${answered===i}">
            <span class="option-dot" aria-hidden="true"></span>${opt}
          </button>`).join('')}
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="goBack()" ${current===0?'style="visibility:hidden"':''} aria-label="Previous question">← Back</button>
      <button class="btn-next" onclick="goNext()" ${answered===null?'disabled':''} aria-label="${current===allQ.length-1?'See results':'Next question'}">
        ${current===allQ.length-1?'See results':'Next →'}
      </button>
    </div>`;
}

function select(i) { answers[current]=i; render(); }
function goNext() {
  if (answers[current]===null) return;
  if (current===allQ.length-1) { showResults=true; } else { current++; }
  render();
}
function goBack() { if (current>0) { current--; render(); } }
function restart() { answers=new Array(allQ.length).fill(null); current=0; showResults=false; render(); }

render();
</script>
